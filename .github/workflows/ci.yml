name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.19"
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check uv lockfile
        run: uv lock --check

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check

      - name: Test
        run: uv run pytest

      - name: Validate OpenSpec
        run: npx -y @fission-ai/openspec@1.3.1 validate --all --strict --no-interactive

  docker-build:
    name: Docker build
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ditto-translation:ci
          cache-from: type=gha,scope=ditto-translation-ci
          cache-to: type=gha,mode=max,scope=ditto-translation-ci,ignore-error=true

  ci-required:
    name: CI Required
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - quality
      - docker-build

    steps:
      - name: Require every CI job to pass
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: details["result"]
              for name, details in sorted(needs.items())
              if details.get("result") not in {"success", "skipped"}
          }
          if failed:
              for name, result in failed.items():
                  print(f"{name}: {result}")
              sys.exit(1)
          print("all required CI jobs passed")
          PY
